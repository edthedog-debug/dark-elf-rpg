<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elden Void 2D: Multilingual Goth Platformer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Almendra+Display&family=Uncial+Antiqua&family=MedievalSharp&family=Cinzel:wght@500;700&display=swap');

        :root {
            --bg-medieval: #050507;
            --iron-plate: #131114;
            --blood-wine: #610c17;
            --gold-relic: #b89047;
        }

        body {
            background-color: var(--bg-medieval);
            background-image: radial-gradient(circle at 50% 50%, rgba(26, 19, 22, 0.9) 0%, #020203 100%);
            color: #cbc3b7;
            font-family: 'MedievalSharp', serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1, h2, h3 { font-family: 'Uncial Antiqua', cursive; color: #e6d3be; text-shadow: 2px 2px 8px #000; text-align: center; margin: 5px 0;}
        h1 { font-size: 2.8em; color: var(--gold-relic); }
        .subtitle { font-family: 'Almendra Display', serif; font-size: 1em; color: #8c2531; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; text-align: center; }

        #game-container {
            width: 100%;
            max-width: 1150px;
            background: var(--iron-plate);
            border: 2px solid #3a312a;
            outline: 6px double var(--gold-relic);
            outline-offset: -12px;
            box-shadow: 0 0 60px #000;
            padding: 30px;
            box-sizing: border-box;
        }

        /* Selector de Idiomas en la Esquina Superior */
        .lang-selector {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .lang-btn {
            background: #1c181f;
            border: 1px solid #4a3e3d;
            color: #aaa;
            padding: 5px 10px;
            font-size: 0.8em;
            cursor: pointer;
            font-family: 'MedievalSharp', sans-serif;
        }
        .lang-btn.active {
            border-color: var(--gold-relic);
            color: #fff;
            background: var(--blood-wine);
            box-shadow: 0 0 8px var(--blood-wine);
        }

        button {
            background: linear-gradient(to bottom, #3c2d24, #1a130e);
            color: #e0d1be;
            border: 1px solid var(--gold-relic);
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Uncial Antiqua', sans-serif;
            font-size: 0.8em;
            transition: all 0.2s ease;
        }
        button:hover:not(:disabled) { background: var(--blood-wine); color: #fff; box-shadow: 0 0 10px var(--blood-wine); }
        input { background: #000; border: 1px solid var(--gold-relic); color: #fff; padding: 10px; font-family: 'MedievalSharp', serif; text-align: center; }

        .flex-container { display: flex; gap: 20px; margin-top: 15px; }
        .panel { flex: 1; background: rgba(10, 9, 11, 0.98); border: 1px solid #2d282e; padding: 15px; box-shadow: inset 0 0 25px #000; }
        .hidden { display: none !important; }

        #canvas-container {
            position: relative;
            background: #000;
            border: 3px solid var(--blood-wine);
            box-shadow: 0 0 30px #000;
            margin: 15px 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }
        canvas { background: linear-gradient(to bottom, #110e14, #060508); display: block; }

        .medal-shelf {
            background: linear-gradient(180deg, #181412 0%, #0d0a09 100%);
            border: 3px ridge #5c4328;
            padding: 15px;
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-height: 180px;
            overflow-y: auto;
        }
        .medal-badge {
            width: 75px;
            height: 95px;
            background: #261f1a;
            border: 2px solid #544436;
            text-align: center;
            padding: 5px;
            font-size: 0.6em;
            font-family: 'Cinzel', serif;
        }
        .medal-icon { font-size: 1.5em; display:block; }
        
        .rare-comun { border-color: #6a6a6a; color: #cbd5e1; }
        .rare-rara { border-color: #0070dd; color: #0070dd; }
        .rare-epica { border-color: #a335ee; color: #a335ee; }
        .rare-legendaria { border-color: var(--gold-relic); color: var(--gold-relic); }
        .rare-reliquia { border-color: #ff3333; color: #ff3333; font-weight: bold; }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
            margin-top: 10px;
            max-height: 150px;
            overflow-y: auto;
        }
        .inv-item { background: #151317; border: 1px solid #352e38; padding: 5px; font-size: 0.75em; text-align: center; }
        .inv-item.equipped { border-color: #4ade80 !important; background: #0c1c11; }
    </style>
</head>
